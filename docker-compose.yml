services:
  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: powerloom
      POSTGRES_PASSWORD: powerloom
      POSTGRES_DB: powerloom_erp
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init.sh

  db-test:
    image: postgres:15-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: powerloom
      POSTGRES_PASSWORD: powerloom
      POSTGRES_DB: powerloom_erp_test
    volumes:
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init.sh

volumes:
  pgdata:
